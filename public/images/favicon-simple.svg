<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Fond anthracite avec coins arrondis -->
  <rect width="32" height="32" rx="4" fill="#131513"/>

  <!-- Ombre portée du bouclier -->
  <path d="M16 3.5 L29.5 7.5 L29.5 19.5 Q29.5 28.5 16 31.5 Q2.5 28.5 2.5 19.5 L2.5 7.5 Z"
        fill="rgba(0,0,0,0.45)" transform="translate(0.6,0.6)"/>

  <!-- Bouclier héraldique émeraude -->
  <path d="M16 3 L29 7 L29 19 Q29 28 16 31 Q3 28 3 19 L3 7 Z"
        fill="#0F3823"/>

  <!-- Bordure extérieure or vieilli -->
  <path d="M16 3 L29 7 L29 19 Q29 28 16 31 Q3 28 3 19 L3 7 Z"
        fill="none" stroke="#C5A059" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Bordure intérieure fine (trait double) -->
  <path d="M16 5 L27 8.5 L27 18.5 Q27 26.5 16 29 Q5 26.5 5 18.5 L5 8.5 Z"
        fill="none" stroke="#C5A059" stroke-width="0.5" stroke-linejoin="round" opacity="0.55"/>

  <!-- Filet horizontal doré -->
  <line x1="5.5" y1="16" x2="26.5" y2="16" stroke="#C5A059" stroke-width="0.8"/>

  <!-- Monogramme GE — partie haute -->
  <text x="16" y="13.5"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="700"
        font-size="9.5"
        letter-spacing="2"
        fill="#E9D18F">GE</text>

  <!-- Losange héraldique — partie basse -->
  <polygon points="16,19.5 18.2,22.5 16,25.5 13.8,22.5" fill="#C5A059"/>

</svg>
